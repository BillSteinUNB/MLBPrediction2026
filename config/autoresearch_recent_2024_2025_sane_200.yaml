session_name: autoresearch-recent-2024-2025-sane-200
trials: 200
random_seed: 20260323
module: src.backtest.walk_forward
output_root: data/models
experiments_dir: data/experiments
refresh_reports: true
max_param_changes_per_trial: 3

objective:
  metric: bankroll_return_pct
  direction: max

constraints:
  - metric: max_drawdown_pct
    operator: "<="
    value: 0.35
  - metric: total_bets
    operator: ">="
    value: 1000

fixed_args:
  training-data: data/training/training_data_2018_2025.parquet
  start: 2024-01-01
  end: 2025-01-01
  test-window-months: 12
  window-mode: anchored_expanding
  anchored-train-start: 2018-01-01
  historical-odds-db: data/mlb.db
  historical-odds-book: "sbr:caesars"
  starting-bankroll-units: 100
  staking-mode: edge_scaled
  min-bet-size-units: 0.25
  max-bet-size-units: 3.0
  edge-scale-cap: 0.06
  calibration-method: identity

baseline_params:
  edge-threshold: 0.06
  max-edge-to-bet: 0.20
  max-depth: 7
  n-estimators: 100
  learning-rate: 0.05
  subsample: 0.7
  colsample-bytree: 0.8
  min-child-weight: 7.0
  gamma: 0.1
  reg-alpha: 0.01
  reg-lambda: 4.0

search_space:
  edge-threshold:
    values: [0.05, 0.06, 0.07]
  max-edge-to-bet:
    values: [0.15, 0.20, 0.25]
  max-depth:
    values: [6, 7, 8]
  n-estimators:
    values: [80, 100, 120]
  learning-rate:
    values: [0.04, 0.05, 0.06]
  subsample:
    values: [0.6, 0.7, 0.8]
  colsample-bytree:
    values: [0.7, 0.8, 0.9]
  min-child-weight:
    values: [5.0, 7.0, 9.0]
  gamma:
    values: [0.0, 0.1, 0.2]
  reg-alpha:
    values: [0.0, 0.01, 0.05]
  reg-lambda:
    values: [3.0, 4.0, 5.0]
