# MLB F5 Prediction System - Services Manifest
# Single source of truth for commands and services

commands:
  install: pip install -e ".[dev]"
  install_windows: '& ".\\.venv\\Scripts\\python.exe" -m pip install -e ".[dev]"'
  init_windows: 'if (-not (Test-Path ".\\.venv\\Scripts\\python.exe")) { python3 -m venv ".venv" }; & ".\\.venv\\Scripts\\python.exe" -m pip install -e ".[dev]"; New-Item -ItemType Directory -Force -Path ".\\data\\raw\\statcast", ".\\data\\models", ".\\data\\logs", ".\\data\\training" | Out-Null; if (-not (Test-Path ".\\.env")) { Write-Host "WARNING: .env file not found. Copy .env.example to .env" }; & ".\\.venv\\Scripts\\python.exe" -c "from src.db import init_db; init_db(''data/mlb.db'')"'
  typecheck: python -m py_compile src/**/*.py
  typecheck_windows: '$env:PYTHONDONTWRITEBYTECODE=1; & ".\\.venv\\Scripts\\python.exe" -m py_compile (Get-ChildItem -Path ".\\src" -Recurse -Filter "*.py" | ForEach-Object { $_.FullName })'
  build: pip install -e "."
  test: pytest tests/ -v --tb=short
  test_windows: '& ".\\.venv\\Scripts\\python.exe" -m pytest ".\\tests" -v --tb=short'
  lint: python -m py_compile src/**/*.py
  lint_ruff: python -m ruff check src tests
  lint_ruff_windows: '& ".\\.venv\\Scripts\\python.exe" -m ruff check ".\\src" ".\\tests"'
  coverage: pytest tests/ --cov=src --cov-report=term-missing

services: {}
  # No long-running services for this batch processing system
  # SQLite is embedded, no port needed
  # Parquet files are static storage

# Pipeline entry points (not services, but useful commands)
pipeline:
  daily: python -m src.pipeline.daily --date today --mode prod
  daily_dryrun: python -m src.pipeline.daily --date today --mode prod --dry-run
  backtest: python -m src.backtest.run --start 2019-03-20 --end 2025-10-31
  calibrate_eval: python -m src.model.calibration
  build_training_data: python -m src.model.data_builder
  train_xgboost: python -m src.model.xgboost_trainer
  train_stacking: python -m src.model.stacking
